---

#
# JSON Schema definition for `mrack` provision plugin
#

$id: /schemas/provision/mrack
$schema: https://json-schema.org/draft-07/schema

type: object
additionalProperties: false

properties:

  how:
    type: string
    enum:
      - beaker

  name:
    type: string

  arch:
    $ref: "/schemas/common#/definitions/arch"

  image:
    type: string

  provision-timeout:
    type: integer
    minimum: 1

  provision-tick:
    type: integer
    minimum: 1

  hardware:
    $ref: "/schemas/provision/hardware#/definitions/hardware"

  kickstart:
    $ref: "/schemas/provision/kickstart#/definitions/kickstart"

  role:
    $ref: "/schemas/common#/definitions/role"

  environment:
    $ref: "/schemas/common#/definitions/environment"

  whiteboard:
    type: string

  beaker-job-owner:
    type: string

  public-key:
    type: array
    items:
      type: string

  beaker-job-group:
    type: string

  quay_secret:
    type: string

  quay_user:
    type: string

  quay_password:
    type: string

  base_image_url:
    type: string

  image_url:
    type: string

  test_image_name:
    type: string

  base_repo:
    type: string

  bootc:
    type: boolean

  customize_image:
    type: boolean

  container-file:
    type: string

  container-file-workdir:
    type: string

  distro_name:
    type: string

required:
  - how
