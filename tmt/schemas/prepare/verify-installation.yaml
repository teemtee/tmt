---

#
# JSON Schema definition for `verify-installation` prepare plugin
#
# https://tmt.readthedocs.io/en/stable/spec/plans.html#spec-plans-prepare-verify-installation
#

$id: /schemas/prepare/verify-installation
$schema: https://json-schema.org/draft-07/schema

type: object
additionalProperties: false

properties:

  how:
    type: string
    enum:
      - verify-installation

  name:
    type: string

  order:
    $ref: "/schemas/core#/definitions/order"

  summary:
    $ref: "/schemas/core#/definitions/summary"

  verify:
    oneOf:
      - type: object
        additionalProperties: false
        properties:
          package:
            type: string
          expected_repo:
            type: string
        required:
          - package
          - expected_repo

      - type: array
        items:
          type: object
          additionalProperties: false
          properties:
            package:
              type: string
            expected_repo:
              type: string
          required:
            - package
            - expected_repo

  where:
    $ref: "/schemas/common#/definitions/where"

  when:
    $ref: "/schemas/common#/definitions/when"

required:
  - how
