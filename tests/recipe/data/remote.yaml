run:
    root: /path/to/fmf_root
    remove: false
    environment:
        RUN_ENV: run_value
    context: {}
plans:
  - name: /plans/remote
    summary: A remote plan
    enabled: true
    order: 50
    environment:
        PLAN_ENV: plan_value
    discover:
        enabled: true
        phases:
          - how: fmf
            url: https://github.com/teemtee/tests
            test: /tests/one
            name: default-0
        tests:
          - name: /tests/one
            discover-phase: default-0
            test: echo one
            path: /default-0/tests/tests
            summary: Remote test one
            enabled: true
            order: 50
            tag:
              - remote
            framework: shell
            manual: false
            tty: false
            duration: 5m
            restart-max-count: 1
            restart-with-reboot: false
            serial-number: 1
            result: respect
    provision:
        enabled: true
        phases:
          - how: container
            environment:
                PROVISION_ENV: provision_value
            name: default-0
    prepare:
        enabled: true
        phases:
          - name: default-0
            how: shell
    execute:
        enabled: true
        phases:
          - how: tmt
            name: default-0
        results-path: plans/remote/execute/results.yaml
    report:
        enabled: true
        phases:
          - name: default-0
            how: display
    finish:
        enabled: true
        phases:
          - name: default-0
            how: shell
    cleanup:
        enabled: true
        phases:
          - name: default-0
            how: tmt
