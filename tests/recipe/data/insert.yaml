run:
    root: /path/to/fmf_root
    remove: false
    environment:
        RUN_ENV: run_value
    context: {}
plans:
  - name: /plans/insert
    summary: A plan with inserted steps
    enabled: true
    order: 50
    environment:
        PLAN_ENV: plan_value
    discover:
        enabled: true
        phases:
          - name: discover-shell
            how: shell
            tests:
              - name: /shell-test
                test: /bin/true
          - how: fmf
            allowed-how:
            name: default-0
            order: 50
            url:
            url-content-type: git
            ref:
            dist-git-source:
            dist-git-type:
            dist-git-download-only:
            dist-git-install-builddeps:
            dist-git-require: []
            require-test: []
            path:
            test: []
            link: []
            filter: []
            include: []
            exclude: []
            modified-only:
            modified-url:
            modified-ref:
            dist-git-init:
            dist-git-remove-fmf-root:
            dist-git-merge:
            dist-git-extract:
            sync-repo:
            fmf-id:
            prune:
            repository:
            revision:
            verbose: 0
            debug: 0
            quiet:
            log-topic: []
            force:
            dry: false
            again:
            feeling-safe: false
            exposable-runner-devices: []
        tests:
          - name: /discover-shell/shell-test
            discover-phase: discover-shell
            test: /bin/true
            path: /discover-shell/tests
            enabled: true
            order: 50
            framework: shell
            manual: false
            tty: false
            duration: 1h
            restart-max-count: 1
            restart-with-reboot: false
            serial-number: 1
            result: respect
          - name: /default-0/tests/first
            discover-phase: default-0
            test: ./test.sh
            path: /default-0/tests
            summary: First test
            enabled: true
            order: 50
            framework: beakerlib
            manual: false
            tty: false
            duration: 5m
            restart-max-count: 1
            restart-with-reboot: false
            serial-number: 2
            require:
              - url: https://github.com/beakerlib/test
                name: /very/deep/file
                type: library
            environment:
                TEST_ENV: test_value
            result: respect
          - name: /default-0/tests/second
            discover-phase: default-0
            test: echo SECOND_TEST
            path: /default-0/tests
            summary: Second test
            enabled: true
            order: 50
            framework: shell
            manual: false
            tty: false
            duration: 5m
            restart-max-count: 1
            restart-with-reboot: false
            serial-number: 3
            result: respect
            check:
              - how: dmesg
                enabled: true
                result: info
                failure-pattern:
                  - 'Call Trace:'
                  - \ssegfault\s
    provision:
        enabled: true
        phases:
          - how: container
            environment:
                PROVISION_ENV: provision_value
            name: default-0
    prepare:
        enabled: true
        phases:
          - name: default-0
            how: shell
    execute:
        enabled: true
        phases:
          - how: tmt
            name: default-0
        results-path: plans/insert/execute/results.yaml
    report:
        enabled: true
        phases:
          - name: default-0
            how: display
    finish:
        enabled: true
        phases:
          - name: default-0
            how: shell
    cleanup:
        enabled: true
        phases:
          - name: default-0
            how: tmt
