run:
    root: /path/to/fmf_root
    remove: false
    environment:
        RUN_ENV: run_value
    context: {}
plans:
  - name: /plans/insert
    summary: A plan with inserted steps
    enabled: true
    order: 50
    environment:
        PLAN_ENV: plan_value
    discover:
        enabled: true
        phases:
          - name: discover-shell
            how: shell
            order: 50
            url-content-type: git
            dist-git-source: false
            dist-git-download-only: false
            dist-git-install-builddeps: false
            keep-git-metadata: false
            tests:
              - name: /shell-test
                test: /bin/true
                enabled: true
                order: 50
                manual: false
                tty: false
                duration: 1h
                result: respect
          - name: default-0
            how: fmf
            order: 50
            url-content-type: git
        tests:
          - name: /discover-shell/shell-test
            discover-phase: discover-shell
            test: /bin/true
            path: /discover-shell/tests
            enabled: true
            order: 50
            framework: shell
            manual: false
            tty: false
            duration: 1h
            restart-max-count: 1
            restart-with-reboot: false
            serial-number: 1
            result: respect
          - name: /default-0/tests/first
            discover-phase: default-0
            test: ./test.sh
            path: /default-0/tests
            summary: First test
            enabled: true
            order: 50
            framework: beakerlib
            manual: false
            tty: false
            duration: 5m
            restart-max-count: 1
            restart-with-reboot: false
            serial-number: 2
            require:
              - url: https://github.com/beakerlib/test
                name: /very/deep/file
                type: library
            environment:
                TEST_ENV: test_value
            result: respect
          - name: /default-0/tests/second
            discover-phase: default-0
            test: echo SECOND_TEST
            path: /default-0/tests
            summary: Second test
            enabled: true
            order: 50
            framework: shell
            manual: false
            tty: false
            duration: 5m
            restart-max-count: 1
            restart-with-reboot: false
            serial-number: 3
            result: respect
            check:
              - how: dmesg
                enabled: true
                result: info
                failure-pattern:
                  - 'Call Trace:'
                  - \ssegfault\s
    provision:
        enabled: true
        phases:
          - name: default-0
            how: container
            order: 50
            become: false
            environment:
                PROVISION_ENV: provision_value
            image: fedora
            user: root
            force-pull: false
            pull-attempts: 5
            pull-interval: 5
            stop-time: 1
    prepare:
        enabled: true
        phases:
          - name: default-0
            how: shell
            order: 50
    execute:
        enabled: true
        phases:
          - name: default-0
            how: tmt
            order: 50
            duration: 1h
            ignore-duration: false
            exit-first: false
            interactive: false
            restraint-compatible: false
            no-progress-bar: false
        results-path: plans/insert/execute/results.yaml
    report:
        enabled: true
        phases:
          - name: default-0
            how: display
            order: 50
            display-guest: auto
    finish:
        enabled: true
        phases:
          - name: default-0
            how: shell
            order: 50
    cleanup:
        enabled: true
        phases:
          - name: default-0
            how: tmt
            order: 50
