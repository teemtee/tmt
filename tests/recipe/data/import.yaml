run:
    root: /path/to/fmf_root
    remove: false
    environment:
        RUN_ENV: run_value
    context: {}
plans:
  - name: /plans/import
    summary: A simple smoke plan for remote testing
    description: This is just a simple smoke plan used for testing import of
        remote plans. See the related test coverage for more details.
    enabled: true
    order: 50
    link:
      - relates: https://github.com/teemtee/tmt/tree/main/tests/plan/import
    discover:
        enabled: true
        phases:
          - how: fmf
            filter: tag:remote
            name: default-0
        tests:
          - name: /tests/one
            discover-phase: default-0
            test: echo one
            path: /default-0/tests/tests
            summary: Remote test one
            enabled: true
            order: 50
            tag:
              - remote
            framework: shell
            manual: false
            tty: false
            duration: 5m
            restart-max-count: 1
            restart-with-reboot: false
            serial-number: 1
            result: respect
          - name: /tests/two
            discover-phase: default-0
            test: echo two
            path: /default-0/tests/tests
            summary: Remote test two
            enabled: true
            order: 50
            tag:
              - remote
            framework: shell
            manual: false
            tty: false
            duration: 5m
            restart-max-count: 1
            restart-with-reboot: false
            serial-number: 2
            result: respect
    provision:
        enabled: false
        phases:
          - how: local
            name: default-0
    prepare:
        enabled: false
        phases:
          - name: enable-latest-copr
            summary: Enable copr repo with the latest tmt bits
            how: install
            copr: '@teemtee/latest'
          - name: disable-tag-repo
            summary: Completely disable the tag repository
            how: shell
            script: "dnf repolist | grep testing-farm-tag-repository || exit 0\nif
                command -v dnf5; then\n    dnf config-manager setopt testing-farm-tag-repository.enabled=0\n\
                else\n    dnf config-manager --set-disabled testing-farm-tag-repository\n\
                fi\n"
    execute:
        enabled: false
        phases:
          - how: tmt
            name: default-0
        results-path: plans/import/execute/results.yaml
    report:
        enabled: false
        phases:
          - name: default-0
            how: display
    finish:
        enabled: false
        phases:
          - name: default-0
            how: shell
    cleanup:
        enabled: false
        phases:
          - name: default-0
            how: tmt
