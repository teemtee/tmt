run:
    root: /path/to/fmf_root
    remove: false
    environment:
        RUN_ENV: run_value
    context: {}
plans:
  - name: /plans/import
    summary: A simple smoke plan for remote testing
    description: This is just a simple smoke plan used for testing import of
        remote plans. See the related test coverage for more details.
    enabled: true
    order: 50
    link:
      - relates: https://github.com/teemtee/tmt/tree/main/tests/plan/import
    discover:
        enabled: true
        phases:
          - name: default-0
            how: fmf
            order: 50
            url-content-type: git
            dist-git-source: false
            dist-git-download-only: false
            dist-git-install-builddeps: false
            filter:
              - tag:remote
            modified-only: false
            dist-git-init: false
            dist-git-remove-fmf-root: false
            dist-git-merge: false
            sync-repo: false
            fmf-id: false
            prune: false
        tests:
          - name: /tests/one
            discover-phase: default-0
            test: echo one
            path: /default-0/tests/tests
            summary: Remote test one
            enabled: true
            order: 50
            tag:
              - remote
            framework: shell
            manual: false
            tty: false
            duration: 5m
            restart-max-count: 1
            restart-with-reboot: false
            serial-number: 1
            result: respect
          - name: /tests/two
            discover-phase: default-0
            test: echo two
            path: /default-0/tests/tests
            summary: Remote test two
            enabled: true
            order: 50
            tag:
              - remote
            framework: shell
            manual: false
            tty: false
            duration: 5m
            restart-max-count: 1
            restart-with-reboot: false
            serial-number: 2
            result: respect
    provision:
        enabled: false
        phases:
          - name: default-0
            how: local
            order: 50
            become: false
    prepare:
        enabled: false
        phases:
          - name: enable-latest-copr
            how: install
            order: 50
            summary: Enable copr repo with the latest tmt bits
            copr:
              - '@teemtee/latest'
            missing: fail
          - name: disable-tag-repo
            how: shell
            order: 50
            summary: Completely disable the tag repository
            script:
              - "dnf repolist | grep testing-farm-tag-repository || exit 0\nif command
                -v dnf5; then\n    dnf config-manager setopt testing-farm-tag-repository.enabled=0\n\
                else\n    dnf config-manager --set-disabled testing-farm-tag-repository\n\
                fi\n"
    execute:
        enabled: false
        phases:
          - name: default-0
            how: tmt
            order: 50
            duration: 1h
            ignore-duration: false
            exit-first: false
            interactive: false
            restraint-compatible: false
            no-progress-bar: false
        results-path: plans/import/execute/results.yaml
    report:
        enabled: false
        phases:
          - name: default-0
            how: display
            order: 50
            display-guest: auto
    finish:
        enabled: false
        phases:
          - name: default-0
            how: shell
            order: 50
    cleanup:
        enabled: false
        phases:
          - name: default-0
            how: tmt
            order: 50
