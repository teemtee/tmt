---
- name: Webservers group tasks
  hosts: webservers
  tasks:
    - name: Log webservers configuration
      ansible.builtin.debug:
        msg: "WEBSERVERS_TASK_EXECUTED on {{ inventory_hostname }}"
    - name: Check that context variables are set
      assert:
        that:
          - tmt.context["plan-var"] == ["foo"]
          - tmt.context["cli-var"] == ["bar"]
