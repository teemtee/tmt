---
- name: Frontend-specific tasks
  hosts: frontend
  tasks:
    - name: Log frontend configuration
      ansible.builtin.debug:
        msg: "FRONTEND_TASK_EXECUTED on {{ inventory_hostname }}"
    - name: Check that context variables are set
      assert:
        that:
          - tmt.context["plan-var"] == ["foo"]
          - tmt.context["cli-var"] == ["bar"]
