name: release
run-name: Release ${{ inputs.ref || github.ref_name }}

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        type: string
        description: 'Tag to release'
        required: true

permissions: {}

jobs:
  build:
    uses: ./.github/workflows/step-build-wheel.yml
    with:
      ref: ${{ inputs.ref }}

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tmt
    permissions:
      id-token: write
      attestations: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist

      - name: Generate artifact attestation for sdist and wheel
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
