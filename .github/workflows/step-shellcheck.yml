name: Differential ShellCheck
on:
  workflow_call:
    inputs:
      ref:
        type: string
        description: Committish to test
      upload_sarif:
        type: boolean
        description: Whether the sarif should be uploaded

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    outputs:
      sarif: ${{ steps.ShellCheck.outputs.sarif }}

    steps:
      - name: Repository checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.ref }}

      - id: ShellCheck
        name: Differential ShellCheck
        uses: redhat-plumbers-in-action/differential-shellcheck@d965e66ec0b3b2f821f75c8eff9b12442d9a7d1e # v5.5.6
        # Note: we do not use token here to have more control of when to upload the sarif.
        #  It might be incorrect to upload them for PRs.
        #  https://github.com/github/codeql-action/issues/3578
        with:
          # Keep exclusions in sync with shellcheck-py hook in .pre-commit-config.yaml
          exclude-path: |
            tests/**
            examples/**
            tmt/steps/execute/scripts/*.sh.j2
            tmt/templates/**

      - if: ${{ always() }}
        name: Upload artifact with ShellCheck defects in SARIF format
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Differential ShellCheck SARIF
          path: ${{ steps.ShellCheck.outputs.sarif }}

  upload-sarif:
    name: Upload sarif
    runs-on: ubuntu-slim
    needs: [ lint ]
    permissions:
      security-events: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Differential ShellCheck SARIF
      - uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: ${{ needs.lint.outputs.sarif }}
    if: ${{ inputs.upload_sarif }}
