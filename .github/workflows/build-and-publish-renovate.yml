name: Build and publish renovate image
on:
  push:
    paths:
      - containers/Containerfile.renovate
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Committish to build and publish
        required: true

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: redhat-actions/buildah-build@b4dc19b4ba891854660ab1f88a097d45aa158f76 # v2.12
        with:
          image: renovate-tmt
          containerfiles: ./containers/Containerfile.renovate
      - uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        with:
          image: renovate-tmt
          tags: latest
          registry: ghcr.io/teemtee
          username: ${{ github.actor }}
          password: ${{ github.token }}
