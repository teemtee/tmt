name: test-docs
run-name: Documentation tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  doc-test:
    name: Sphinx-${{ matrix.builder }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        builder: [ html, linkcheck ]
        include:
          # Run default html builder with warnings as error
          - builder: html
            args: -W
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Run sphinx builder ${{ matrix.builder }}
        run: |
          pip install -e .[docs]
          python3 -m sphinx -b ${{ matrix.builder }} docs docs/_build ${{ matrix.args }}
      - name: Debug artifacts
        uses: actions/upload-artifact@v4
        with:
         name: sphinx-${{matrix.builder}}
         path: docs
        if: always()
